services:
  frontend-build:
    build: ./frontend
    volumes:
      - frontend_dist:/app/dist

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      flask:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped

  flask:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  pii_vault:
    build:
      context: .
      dockerfile: pii_vault/Dockerfile
    expose:
      - "8888"
    env_file:
      - .env
    depends_on:
      vault_db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vault_db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${VAULT_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${VAULT_DB_NAME}
      MYSQL_USER: ${VAULT_DB_USER}
      MYSQL_PASSWORD: ${VAULT_DB_PASS}
    volumes:
      - vault_db_data:/var/lib/mysql
      - ./pii_vault/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${VAULT_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-backup:
    image: mysql:8.0
    entrypoint: >
      sh -c "chmod +x /backup.sh &&
             while true; do
               /backup.sh;
               sleep 86400;
             done"
    env_file:
      - .env
    volumes:
      - ./backup/backup.sh:/backup.sh:ro
      - db_backups:/backups
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy
      vault_db:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  vault_db_data:
  mongo_data:
  frontend_dist:
  db_backups:
