name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend – Lint & Test
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Hard-fail on syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on all other style issues
          flake8 backend/ --count --max-line-length=120 --statistics --exit-zero

      - name: Run backend tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test.db
        run: |
          if [ -d "backend/tests" ]; then
            pytest backend/tests/ -v --tb=short
          else
            echo "No backend/tests directory found – skipping"
          fi

  # ─────────────────────────────────────────
  # JOB 2: Frontend – Build & Lint
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend – Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script defined – skipping"
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: ESLint SAST (JavaScript / React)
  # ─────────────────────────────────────────
  eslint-sast:
    name: ESLint SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run ESLint with SARIF output
        working-directory: frontend
        run: npx eslint src/ --format @microsoft/eslint-formatter-sarif --output-file ../reports/eslint-results.sarif || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/eslint-results.sarif

      - name: Upload ESLint SARIF report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: eslint-sast-report
          path: reports/eslint-results.sarif
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4: CodeQL Analysis
  # ─────────────────────────────────────────
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────
  # JOB 5: Security Scan
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, eslint-sast, codeql-analysis]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (Python SAST)
        run: |
          bandit -r backend/ -ll -ii --format json -o bandit-report.json || true
          bandit -r backend/ -ll -ii || true

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ICT2216-Secure-Software-Development"
          path: "."
          format: "HTML"
          out: "dependency-check-report"

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: Upload OWASP Dependency Check report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: dependency-check-report
          path: dependency-check-report
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 6: Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [security-scan]
    # Only deploy on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      REMOTE_DIR: ~/ICT2216-Secure-Software-Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem

      - name: Test SSH connection
        run: |
          result=$(ssh -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            -o ConnectTimeout=10 \
            "${{ secrets.EC2_HOST }}" "echo ok")
          if [[ "$result" != "ok" ]]; then
            echo "SSH failed: $result"
            exit 1
          fi
          echo "SSH connection OK"

      - name: Create git archive
        run: git archive --format=tar HEAD -o /tmp/app.tar

      - name: Upload archive to EC2
        run: |
          scp -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            /tmp/app.tar "${{ secrets.EC2_HOST }}:~/trialguard.tar"

      - name: Extract on EC2
        run: |
          ssh -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            "${{ secrets.EC2_HOST }}" \
            "mkdir -p $REMOTE_DIR && cd $REMOTE_DIR && tar xf ~/trialguard.tar && echo extracted"

      - name: Rebuild and restart containers on EC2
        run: |
          ssh -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            "${{ secrets.EC2_HOST }}" \
            "cd $REMOTE_DIR &&
             docker compose build --no-cache frontend-build &&
             docker compose stop nginx frontend-build &&
             docker ps -a --filter volume=ict2216-secure-software-development_frontend_dist \
               --format '{{.ID}}' | xargs -r docker rm -f &&
             docker volume rm ict2216-secure-software-development_frontend_dist 2>/dev/null || true &&
             docker compose up -d --build 2>&1 | tail -20"

      - name: Verify container status
        run: |
          ssh -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            "${{ secrets.EC2_HOST }}" \
            "cd $REMOTE_DIR && docker compose ps"

      - name: Health check
        run: |
          health=$(ssh -i ~/.ssh/deploy.pem \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            "${{ secrets.EC2_HOST }}" \
            "curl -sk https://localhost/api/health")
          echo "Health response: $health"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy.pem